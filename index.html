<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>זריחה תשפ״ו</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="זריחה">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07080f;--gold:#ffd060;--amber:#ff9020;--cream:#fff8e8;
  --dim:#8a7840;--card1:#130f00;--card2:#1c1400;
  --border1:#4a3200;--border2:#6a4400;--purple:#c0a0ff;
}
body{
  background:var(--bg);color:#fff;
  font-family:'Segoe UI',Arial,sans-serif;
  height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,10px) 12px env(safe-area-inset-bottom,10px);
  gap:6px;
}

/* ── HEADER ── */
.header{
  width:100%;text-align:center;
  user-select:none;flex-shrink:0;
  padding-top:4px;
}
.heb-date{
  font-size:min(7vw,28px);font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.greg-date{font-size:12px;color:#665;margin-top:1px;}
.sunrise-today{
  font-size:min(5vw,20px);font-weight:700;
  color:var(--gold);margin-top:4px;letter-spacing:1px;
}
.sunrise-today span{font-size:min(3.5vw,14px);color:var(--dim);font-weight:400;}

/* ── SHMA CARD ── */
.card-shma{
  width:100%;border-radius:16px;
  background:linear-gradient(145deg,var(--card1),#0b0900);
  border:2px solid var(--border1);
  padding:12px 16px;flex-shrink:0;
  transition:border-color .5s,box-shadow .5s;
}
.card-shma.lit{border-color:var(--amber);box-shadow:0 0 28px rgba(255,144,32,.3);}
.card-label{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:3px;}
.shma-time{
  font-size:min(12vw,48px);font-weight:900;
  color:#ffe090;font-variant-numeric:tabular-nums;
  line-height:1;margin-bottom:6px;
}
.shma-cd{
  font-size:min(10vw,40px);font-weight:900;
  font-variant-numeric:tabular-nums;
  color:var(--cream);line-height:1;
}

/* ── HANETZ CARD (main big) ── */
.card-hanetz{
  width:100%;border-radius:20px;
  background:linear-gradient(145deg,var(--card2),#0e0900);
  border:2px solid var(--border2);
  padding:16px 16px;flex-grow:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:border-color .5s,box-shadow .5s;
  position:relative;overflow:hidden;
}
.card-hanetz.lit{
  border-color:var(--gold);
  box-shadow:0 0 50px rgba(255,208,96,.35);
}
.hanetz-label{
  font-size:14px;color:var(--gold);opacity:.7;
  letter-spacing:3px;margin-bottom:4px;font-weight:700;
}
.hanetz-time{
  font-size:min(26vw,116px);font-weight:900;
  color:var(--gold);font-variant-numeric:tabular-nums;
  line-height:1;
  text-shadow:0 0 60px rgba(255,208,96,.7),0 0 20px rgba(255,208,96,.4);
  margin-bottom:6px;
}
.hanetz-cd{
  font-size:min(28vw,999px);font-weight:900;
  font-variant-numeric:tabular-nums;
  background:linear-gradient(135deg,var(--cream),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.hanetz-cd.minus{
  background:linear-gradient(135deg,#ff9090,#ff4040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.attr{font-size:10px;color:#2a2015;position:absolute;bottom:8px;right:14px;}

/* ── CLOCK MODE (after 10 min past sunrise) ── */
.clock-mode{
  display:none;position:fixed;inset:0;
  flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);z-index:100;gap:4px;
  padding:0;margin:0;
}
.clock-mode.show{display:flex;}
@media(orientation:landscape){
  .clock-date{font-size:5.2vh!important;}
  .clock-tomorrow{font-size:4.2vh!important;}
}

.clock-date{font-size:min(8.5vw,38px);color:#aaa;margin-top:8px;font-weight:600;}
.clock-tomorrow{font-size:min(6.8vw,30px);color:#999;margin-top:4px;}
.clock-tomorrow span{color:var(--gold);}

/* ── BANNER ── */
.banner{
  display:none;width:100%;border-radius:12px;
  padding:10px;text-align:center;
  font-size:16px;font-weight:800;flex-shrink:0;
}
.banner.show{display:block;}
.banner.red{background:linear-gradient(135deg,#0a0000,#150000);border:2px solid #c03030;color:#ff8080;}

/* ── COLOR PICKER ── */
.color-bar{
  display:flex;gap:8px;justify-content:center;
  flex-shrink:0;padding:2px 0;
}
.color-dot{
  width:22px;height:22px;border-radius:50%;
  cursor:pointer;border:2px solid transparent;
  transition:border-color .2s,transform .2s;
}
.color-dot.active{border-color:#fff;transform:scale(1.2);}

/* ── DEBUG ── */
.dbg{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#0f0a00;border-top:2px solid #aa6600;
  padding:14px;text-align:center;
  z-index:9999;
}
.dbg.open{display:block;}
.dbg input{
  font-size:22px;background:#1a1200;color:var(--gold);
  border:1px solid #5a4000;border-radius:8px;
  padding:5px;width:100%;text-align:center;
  margin-bottom:6px;outline:none;
}
.dbs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.db{
  background:#1a1000;border:1px solid #5a3800;
  color:#cc9940;border-radius:6px;
  padding:4px 8px;font-size:11px;cursor:pointer;
}

/* Landscape */
@media(orientation:landscape){
  body{flex-direction:row;flex-wrap:wrap;align-items:flex-start;padding:6px 10px;}
  .header,.banner,.color-bar,.dbg{width:100%;}
  .card-shma{width:calc(40% - 5px);align-self:stretch;}
  .card-hanetz{width:calc(60% - 5px);}
  .clock-mode{width:100%;}
  .heb-date{font-size:min(4vw,22px);}
  .hanetz-time{font-size:min(12vw,56px);}
  .hanetz-cd{font-size:min(14vw,999px);}
}
</style>
</head>
<body>

<div class="header" id="hdrEl">
  <div class="heb-date" id="hebDate">טוען...</div>
  <div class="greg-date" id="gregDate"></div>
  <div style="font-size:11px;color:#aaa;letter-spacing:1px;margin-top:2px;font-family:monospace;cursor:pointer;" onclick="document.getElementById('dbg').classList.toggle('open')">גרסה v29 🔧</div>
  <div class="sunrise-today"><span>הנץ החמה: </span><span id="sunriseDisplay">--:--:--</span></div>
</div>

<div class="banner" id="banner"></div>

<div class="card-shma" id="cardShma">
  <div class="card-label">קריאת שמע — 4 דק׳ לפני הנץ</div>
  <div class="shma-time" id="shmaTime">--:--:--</div>
  <div class="shma-cd" id="shmaCd">--:--:--</div>
</div>

<div class="card-hanetz" id="cardHanetz">
  <div class="hanetz-label">נץ החמה — תפילת עמידה</div>
  <div class="hanetz-time" id="hanetzTime">--:--:--</div>
  <div class="hanetz-cd" id="hanetzCd">--:--:--</div>
  <div class="attr">לוח צלותיה דאברהם • תשפ״ו</div>
</div>

<!-- Clock mode: shown after +10min past sunrise -->
<div class="clock-mode" id="clockMode">
  <div id="segCanvas" style="font-size:min(20vw,52vh);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-1px;color:var(--gold);font-family:'Courier New',monospace;text-align:center;width:100%;line-height:1;padding:0;overflow:hidden;white-space:nowrap;transform:scaleY(1.6);transform-origin:center center;display:block;"></div>
  <div class="clock-date" id="clockDate"></div>
  <div class="clock-tomorrow" id="clockTomorrow"></div>
  <div class="color-bar" id="colorBarClock" style="margin-top:8px;opacity:0;transition:opacity .3s;"></div>
  <div style="font-size:11px;color:#aaa;position:absolute;bottom:8px;left:10px;letter-spacing:1px;font-family:monospace;cursor:pointer;" onclick="document.getElementById('dbg').classList.toggle('open')">גרסה v29 🔧</div>
</div>

<!-- Color theme picker -->
<div class="color-bar" id="colorBar" style="opacity:0;transition:opacity .3s;">
  <div class="color-dot active" data-theme="gold"    style="background:linear-gradient(135deg,#ffd060,#ff9020)" title="זהב"></div>
  <div class="color-dot"        data-theme="blue"    style="background:linear-gradient(135deg,#60c0ff,#2060ff)" title="כחול"></div>
  <div class="color-dot"        data-theme="green"   style="background:linear-gradient(135deg,#60ffa0,#10a040)" title="ירוק"></div>
  <div class="color-dot"        data-theme="purple"  style="background:linear-gradient(135deg,#d080ff,#8020c0)" title="סגול"></div>
  <div class="color-dot"        data-theme="white"   style="background:linear-gradient(135deg,#ffffff,#aaaaaa)" title="לבן"></div>
  <div class="color-dot"        data-theme="yellow"  style="background:linear-gradient(135deg,#ffee00,#ffaa00)" title="צהוב עז"></div>
</div>

<div class="dbg" id="dbg">
  <input type="time" id="dt" step="1" value="05:30:00">
  <div class="dbs">
    <button class="db" onclick="sd('04:00:00')">04:00</button>
    <button class="db" id="btnHrBefore">שעה לפני</button>
    <button class="db" id="btnSR">הנץ</button>
    <button class="db" id="btnPlus5">+5 דק׳</button>
    <button class="db" id="btnPlus12">+12 דק׳</button>
    <button class="db" onclick="sd('14:00:00')">14:00</button>
    <button class="db" onclick="sd(null)">⟳ אמיתי</button>
    <button class="db" onclick="exitFS()">יציאה ממסך מלא</button>
    <button class="db" onclick="document.getElementById('dbg').classList.remove('open')">סגור</button>
  </div>
</div>

// ── HELPERS ───────────────────────────────────────────────────────────
function gk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getSR(k){
  const diff = Math.round((new Date(k)-ANCHOR)/864e5);
  if(diff<0||diff>=SR.length) return null;
  const v=SR[diff];
  return String(Math.floor(v/3600)).padStart(2,'0')+':'+String(Math.floor((v%3600)/60)).padStart(2,'0')+':'+String(v%60).padStart(2,'0');
}
function getSRsec(k){
  const diff = Math.round((new Date(k)-ANCHOR)/864e5);
  if(diff<0||diff>=SR.length) return null;
  return SR[diff];
}
function toMs(ts){
  const p=ts.split(':').map(Number),d=new Date(now2());
  d.setHours(p[0],p[1],p[2]||0,0); return d.getTime();
}
function addSec(ts,sec){
  const p=ts.split(':').map(Number), tot=p[0]*3600+p[1]*60+(p[2]||0)+sec;
  return String(Math.floor(tot/3600)).padStart(2,'0')+':'+String(Math.floor((tot%3600)/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function fmt(ms, allowMinus){
  const neg = ms < 0;
  if(neg && !allowMinus) return 'עבר';
  const s=Math.floor(Math.abs(ms)/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  const str=(h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  return neg ? '−'+str : str;
}
function fmtClock(d){
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function drawSeg(t){
  const el = document.getElementById('segCanvas');
  el.textContent = t;
  const col = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim()||'#ffd060';
  el.style.color = col;
}

function updHeader(){

  document.getElementById('hebDate').textContent = H[k]||'—';
  document.getElementById('gregDate').textContent = 'יום '+DAYS[n.getDay()]+' | '+n.getDate()+'.'+(n.getMonth()+1)+'.'+n.getFullYear()+(dOff!==null?' 🔧':'');
  const sr=getSR(k);
  document.getElementById('sunriseDisplay').textContent = sr||'—';
}
updHeader();

function getTomorrow(){
  const n=now2(), t=new Date(n); t.setDate(t.getDate()+1);
  return gk(t);
}

function tick(){
  const n=now2(), k=gk(n), t=n.getTime();
  const srStr=getSR(k);
  if(!srStr) return;

  const shmaStr = addSec(srStr, -240); // 4 min before
  const srMs = toMs(srStr), shmaMs = toMs(shmaStr);
  const diffSr = srMs - t; // negative after sunrise
  const diffShma = shmaMs - t;

  const MINUS10 = -600000; // 10 min after sunrise

  // ── CLOCK MODE (after 10 min past sunrise, until 1hr before tomorrow) ──
  const tmrStr = getSR(getTomorrow());
  // toMs gives time on TODAY - add 86400000ms to get tomorrow's actual ms
  const tmrMs = tmrStr ? toMs(tmrStr) + 86400000 : null;
  const oneHrBeforeTmr = tmrMs ? tmrMs - 3600000 : null;

  const inClockMode = diffSr < MINUS10 && (!oneHrBeforeTmr || t < oneHrBeforeTmr);

  document.getElementById('cardShma').style.display   = inClockMode ? 'none' : '';
  document.getElementById('cardHanetz').style.display = inClockMode ? 'none' : '';
  document.getElementById('colorBar').style.display   = inClockMode ? 'none' : '';
  document.getElementById('clockMode').classList.toggle('show', inClockMode);

  if(inClockMode){
    lastTime=fmtClock(n); drawSeg(lastTime);
    document.getElementById('clockDate').textContent = (H[k]||'') + ' | ' + n.getDate()+'.'+(n.getMonth()+1);
    if(tmrStr){
      const remTmr = tmrMs - t;
      document.getElementById('clockTomorrow').innerHTML =
        'זריחה מחר: <span>'+tmrStr+'</span> | עוד '+fmt(remTmr, false);
    }
    return;
  }

  // ── NORMAL MODE ──
  document.getElementById('shmaTime').textContent = shmaStr;
  document.getElementById('hanetzTime').textContent = srStr;

  // Shma countdown — show minus too
  const shmaCdEl = document.getElementById('shmaCd');
  const cardShmaEl = document.getElementById('cardShma');
  if(diffShma < 0){
    shmaCdEl.textContent = '';
    cardShmaEl.style.display = 'none';
  } else {
    cardShmaEl.style.display = '';
    shmaCdEl.textContent = fmt(diffShma, false);
  }

  // Hanetz countdown — minus for 10 min, then clock mode kicks in
  const cdEl = document.getElementById('hanetzCd');
  cdEl.textContent = fmt(diffSr, true);
  cdEl.classList.toggle('minus', diffSr < 0);

  // Glow when within 1hr
  document.getElementById('cardShma').classList.toggle('lit', diffSr < 3600000 && diffSr > MINUS10);
  document.getElementById('cardHanetz').classList.toggle('lit', diffSr < 3600000 && diffSr > MINUS10);
}

  const [h,m,s] = sr.split(':').map(Number);
  const srSec = h*3600+m*60+s;
  function secToTime(sec){ return String(Math.floor(sec/3600)).padStart(2,'0')+':'+String(Math.floor((sec%3600)/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
  document.getElementById('btnHrBefore').onclick = ()=>sd(secToTime(srSec-3600));
  document.getElementById('btnSR').onclick       = ()=>sd(sr);
  document.getElementById('btnPlus5').onclick    = ()=>sd(secToTime(srSec+300));
  document.getElementById('btnPlus12').onclick   = ()=>sd(secToTime(srSec+720));
}
wireDbgButtons();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}</script>
